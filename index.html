<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕市・脳トレ名所めぐり</title>
    <style>
        body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; text-align: center; background-color: #fdfaf0; margin: 0; padding: 20px; color: #333; }
        h1 { color: #2c3e50; font-size: 22px; margin-bottom: 10px; }
        .spot-name { font-size: 20px; font-weight: bold; color: #d35400; margin-bottom: 15px; min-height: 1.5em; }
        .controls { margin-bottom: 15px; }
        button { font-size: 18px; padding: 12px 24px; cursor: pointer; border-radius: 50px; border: none; background: #27ae60; color: white; box-shadow: 0 4px #1e8449; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #1e8449; }
        
        #puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            max-width: 360px;
            margin: 0 auto;
            border: 6px solid #8e44ad;
            background-color: #8e44ad;
            border-radius: 8px;
            overflow: hidden;
        }
        .tile {
            aspect-ratio: 1 / 1;
            background-size: 300% 300%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .tile.selected { filter: brightness(1.3); outline: 5px solid #f1c40f; outline-offset: -5px; }
        .message-area { margin-top: 20px; min-height: 80px; }
        .congrats { font-size: 24px; font-weight: bold; color: #e67e22; animation: bounce 0.5s infinite alternate; margin-bottom: 10px; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
        .next-btn { background: #e67e22; box-shadow: 0 4px #d35400; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <h1>脳トレ！燕市パズル</h1>
    <div id="spot-title" class="spot-name"></div>
    
    <div class="controls">
        <button id="shuffle-btn" onclick="shuffleTiles()">まぜる（やり直し）</button>
    </div>

    <div id="puzzle-board"></div>

    <div class="message-area">
        <div id="message"></div>
        <button id="next-btn" class="next-btn" onclick="nextLevel()">次の名所へ進む ＞</button>
    </div>

    <script>
        // 指定された写真と地名のリスト
        const STAGES = [
            { name: "「吉田下町の旧今井銀行」", url: "imai_bank.jpg" },
            { name: "「宮町商店街（JR燕駅から歩いて5分）」", url: "miyamachi.jpg" },
            { name: "「大河津分水路の桜」", url: "Bunsui_sakura.jpg" },
            { name: "「国上山・五合庵」", url: "kugami_gogo.jpg" },
            { name: "「公楽園」", url: "kourakuen.jpg" }
        ];

        let currentStage = 0;
        const GRID_SIZE = 3; 
        let tiles = [];
        let selectedTile = null;

        function initPuzzle() {
            const board = document.getElementById('puzzle-board');
            const spotTitle = document.getElementById('spot-title');
            board.innerHTML = '';
            tiles = [];
            selectedTile = null;
            
            // 地名の表示
            spotTitle.innerText = STAGES[currentStage].name;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('message').innerHTML = '';

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = i; 
                tile.dataset.current = i; 
                
                const x = (i % GRID_SIZE) * 50;
                const y = Math.floor(i / GRID_SIZE) * 50;
                tile.style.backgroundImage = `url(${STAGES[currentStage].url})`;
                tile.style.backgroundPosition = `${x}% ${y}%`;
                
                tile.onclick = () => handleTileClick(tile);
                board.appendChild(tile);
                tiles.push(tile);
            }
            shuffleTiles();
        }

        function handleTileClick(tile) {
            if (document.getElementById('next-btn').style.display === 'block') return;

            if (selectedTile === null) {
                selectedTile = tile;
                tile.classList.add('selected');
            } else {
                swapTiles(selectedTile, tile);
                selectedTile.classList.remove('selected');
                selectedTile = null;
                checkWin();
            }
        }

        function swapTiles(tile1, tile2) {
            const tempPos = tile1.style.backgroundPosition;
            const tempIdx = tile1.dataset.index;
            tile1.style.backgroundPosition = tile2.style.backgroundPosition;
            tile1.dataset.index = tile2.dataset.index;
            tile2.style.backgroundPosition = tempPos;
            tile2.dataset.index = tempIdx;
        }

        function shuffleTiles() {
            for (let i = 0; i < 30; i++) {
                const r1 = Math.floor(Math.random() * tiles.length);
                const r2 = Math.floor(Math.random() * tiles.length);
                swapTiles(tiles[r1], tiles[r2]);
            }
            document.getElementById('message').innerHTML = '';
        }

        function checkWin() {
            const isWin = tiles.every(tile => tile.dataset.index == tile.dataset.current);
            if (isWin) {
                document.getElementById('message').innerHTML = '<div class="congrats">正解！お見事です！</div>';
                if (currentStage < STAGES.length - 1) {
                    document.getElementById('next-btn').style.display = 'inline-block';
                } else {
                    document.getElementById('message').innerHTML += '<p>全5箇所、すべて完成しました！<br>脳が活性化されましたね！</p>';
                }
            }
        }

        function nextLevel() {
            currentStage++;
            initPuzzle();
        }

        initPuzzle();
    </script>
</body>
</html>
