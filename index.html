

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕三条・脳トレパズル</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f8ff; margin: 0; padding: 20px; }
        h1 { color: #2c3e50; font-size: 24px; }
        .controls { margin-bottom: 20px; }
        button { font-size: 18px; padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; background: #3498db; color: white; }
        
        /* パズルボードの設定 */
        #puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            max-width: 360px;
            margin: 0 auto;
            border: 4px solid #2c3e50;
            background-color: #2c3e50;
        }
        .tile {
            aspect-ratio: 1 / 1;
            background-size: 300% 300%; /* 3x3分割用 */
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.2s;
        }
        .tile.selected { outline: 5px solid #e74c3c; outline-offset: -5px; transform: scale(0.95); }
        .message { margin-top: 20px; font-size: 20px; font-weight: bold; color: #27ae60; height: 30px; }
    </style>
</head>
<body>

    <h1>脳トレ！地元の風景パズル</h1>
    
    <div class="controls">
        <button onclick="shuffleTiles()">最初から（まぜる）</button>
    </div>

    <div id="puzzle-board"></div>
    <div id="message" class="message"></div>

    <script>
        // パズルの設定
        const GRID_SIZE = 3; // 3x3
        // ここをご両親が撮った写真や、ネット上の写真URLに変えるだけでOK！
        const IMAGE_URL = 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800'; 
        
        let tiles = [];
        let selectedTile = null;

        // 初期化
        function initPuzzle() {
            const board = document.getElementById('puzzle-board');
            tiles = [];
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.index = i; // 正解の位置
                tile.dataset.current = i; // 現在の位置
                
                // 背景画像の位置計算
                const x = (i % GRID_SIZE) * 50; // 0, 50, 100%
                const y = Math.floor(i / GRID_SIZE) * 50;
                tile.style.backgroundImage = `url(${IMAGE_URL})`;
                tile.style.backgroundPosition = `${x}% ${y}%`;
                
                tile.onclick = () => handleTileClick(tile);
                board.appendChild(tile);
                tiles.push(tile);
            }
            shuffleTiles();
        }

        // クリック処理
        function handleTileClick(tile) {
            if (selectedTile === null) {
                selectedTile = tile;
                tile.classList.add('selected');
            } else {
                // 入れ替え
                swapTiles(selectedTile, tile);
                selectedTile.classList.remove('selected');
                selectedTile = null;
                checkWin();
            }
        }

        function swapTiles(tile1, tile2) {
            const tempPos = tile1.style.backgroundPosition;
            const tempIdx = tile1.dataset.index;

            tile1.style.backgroundPosition = tile2.style.backgroundPosition;
            tile1.dataset.index = tile2.dataset.index;

            tile2.style.backgroundPosition = tempPos;
            tile2.dataset.index = tempIdx;
        }

        // シャッフル
        function shuffleTiles() {
            document.getElementById('message').innerText = "";
            for (let i = 0; i < 20; i++) {
                const r1 = Math.floor(Math.random() * tiles.length);
                const r2 = Math.floor(Math.random() * tiles.length);
                swapTiles(tiles[r1], tiles[r2]);
            }
        }

        // 正解判定
        function checkWin() {
            const isWin = tiles.every(tile => tile.dataset.index == tile.dataset.current);
            if (isWin) {
                document.getElementById('message').innerText = "お見事！完成です！";
            }
        }

        initPuzzle();
    </script>
</body>
</html>
